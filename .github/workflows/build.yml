name: Build

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build all platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build.sh derives the version from git tags.
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Ensure zip is available
        run: command -v zip >/dev/null || (sudo apt-get update && sudo apt-get install -y zip)

      - name: Build
        run: ./build.sh

      - name: Verify artifacts were produced
        run: |
          ls -lh dist
          # One archive per target plus the checksum file.
          count=$(find dist -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' \) | wc -l)
          echo "archives: $count"
          test "$count" -eq 6

      - uses: actions/upload-artifact@v4
        with:
          name: rpa-explorer-binaries
          path: dist/
          retention-days: 14

  release:
    name: Publish GitHub release
    # Only tagged builds are published.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rpa-explorer-binaries
          path: dist

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -lh dist
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "RPA Explorer $TAG" \
              --generate-notes
          fi
