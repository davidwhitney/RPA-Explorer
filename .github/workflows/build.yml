name: Build

on:
  push:
    branches: [ master, main ]
    # Documentation-only changes do not affect the binaries.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
  # Called by release.yml so tagged builds reuse this exact definition. Path filters
  # deliberately live here only: a tag must always build, whatever it touched.
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build all platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build.sh derives the version from git tags.
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Ensure zip is available
        run: command -v zip >/dev/null || (sudo apt-get update && sudo apt-get install -y zip)

      - name: Build
        run: ./build.sh

      - name: Verify artifacts were produced
        run: |
          ls -lh dist
          # One archive per target, plus the extra Windows no-VLC variant.
          count=$(find dist -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' \) | wc -l)
          echo "archives: $count"
          test "$count" -eq 6

      - uses: actions/upload-artifact@v4
        with:
          name: rpa-explorer-binaries
          path: dist/
          retention-days: 14
