name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read

jobs:
  # Reuses the build workflow so a release is built exactly like every other build.
  # No path filters here: a tag must always produce artifacts.
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rpa-explorer-binaries
          path: dist

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -lh dist
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "RPA Explorer $TAG" \
              --generate-notes
          fi
